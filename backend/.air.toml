# ─── Air Hot Reload Configuration ──────────────────────
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/api ./cmd/api"
  bin = "./tmp/api"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml", "env"]

[color]
  app = ""
  build = "yellow"
  main = "green"
  runner = "magenta"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = true