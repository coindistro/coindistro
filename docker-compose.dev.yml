# ─── Coindistro Development Docker Compose ──────────
# Usage: docker compose -f docker-compose.dev.yml up --build
# Features: hot reload, bind mounts, dev dependencies

services:
  # ── Web (Next.js Dev Server) ────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: coindistro-web-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - DATABASE_URL=postgres://coindistro:coindistro@postgres:5432/coindistro
      - REDIS_URL=redis://redis:6379
    volumes:
      # Bind mount source for hot reload
      - ./apps/web/src:/app/src
      - ./apps/web/public:/app/public
      - ./apps/web/next.config.mjs:/app/next.config.mjs
      - ./apps/web/tsconfig.json:/app/tsconfig.json
      - ./apps/web/tailwind.config.ts:/app/tailwind.config.ts
      - ./apps/web/postcss.config.mjs:/app/postcss.config.mjs
      - ./apps/web/.eslintrc.json:/app/.eslintrc.json
      # Anonymous volumes for node_modules (don't bind mount them)
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - coindistro-network-dev

  # ── PostgreSQL ──────────────────────────────────
  postgres:
    image: postgres:16-bookworm
    container_name: coindistro-postgres-dev
    restart: unless-stopped
    environment:
      - POSTGRES_USER=coindistro
      - POSTGRES_PASSWORD=coindistro
      - POSTGRES_DB=coindistro
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coindistro -d coindistro"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - coindistro-network-dev

  # ── Redis ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: coindistro-redis-dev
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass coindistro
    ports:
      - "6380:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - coindistro-network-dev

# ─── Networks ─────────────────────────────────────
networks:
  coindistro-network-dev:
    driver: bridge
    name: coindistro-network-dev

# ─── Volumes ──────────────────────────────────────
volumes:
  postgres_data_dev:
    name: coindistro-postgres-data-dev
  redis_data_dev:
    name: coindistro-redis-data-dev